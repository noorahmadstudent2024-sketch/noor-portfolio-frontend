<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Noor Ahmad Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login Section */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .login-box h1 i {
            color: #3498db;
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success-msg {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        /* Dashboard Section */
        .dashboard-section {
            display: none;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            font-size: 24px;
        }

        .dashboard-header h1 i {
            color: #3498db;
            margin-right: 10px;
        }

        .btn-logout {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 10px 20px;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #e74c3c;
            color: #fff;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #3498db, #2ecc71);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h2 {
            font-size: 20px;
        }

        .btn-add {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(52, 152, 219, 0.2);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-delete {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tech-tag {
            background: rgba(52, 152, 219, 0.3);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            th, td {
                padding: 10px 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <section class="login-section" id="login-section">
        <div class="login-box">
            <h1><i class="fas fa-lock"></i>Admin Login</h1>
            <div class="error-msg" id="login-error"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>
    </section>

    <!-- Dashboard Section -->
    <section class="dashboard-section" id="dashboard-section">
        <div class="container">
            <div class="dashboard-header">
                <h1><i class="fas fa-tachometer-alt"></i>Admin Dashboard</h1>
                <button class="btn-logout" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="projects">
                    <i class="fas fa-project-diagram"></i> Projects
                </button>
                <button class="tab-btn" data-tab="contacts">
                    <i class="fas fa-envelope"></i> Contacts
                </button>
            </div>

            <!-- Projects Tab -->
            <div class="tab-content active" id="projects-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-folder-open"></i> Manage Projects</h2>
                        <button class="btn-add" id="add-project-btn">
                            <i class="fas fa-plus"></i> Add Project
                        </button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Technologies</th>
                                    <th>Links</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="projects-table">
                                <tr>
                                    <td colspan="4" class="empty-state">
                                        <i class="fas fa-folder-open"></i>
                                        <p>Loading projects...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Contacts Tab -->
            <div class="tab-content" id="contacts-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-envelope-open-text"></i> Contact Messages</h2>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Message</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="contacts-table">
                                <tr>
                                    <td colspan="5" class="empty-state">
                                        <i class="fas fa-envelope"></i>
                                        <p>Loading contacts...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Add/Edit Project Modal -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Project</h2>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>
            <form id="project-form">
                <input type="hidden" id="project-id">
                <div class="form-group">
                    <label for="project-title">Title *</label>
                    <input type="text" id="project-title" placeholder="Project title" required>
                </div>
                <div class="form-group">
                    <label for="project-description">Description *</label>
                    <textarea id="project-description" rows="4" placeholder="Project description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="project-technologies">Technologies (comma separated)</label>
                    <input type="text" id="project-technologies" placeholder="HTML, CSS, JavaScript">
                </div>
                <div class="form-group">
                    <label for="project-image">Image URL</label>
                    <input type="text" id="project-image" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label for="project-github">GitHub Link</label>
                    <input type="text" id="project-github" placeholder="https://github.com/...">
                </div>
                <div class="form-group">
                    <label for="project-live">Live Demo Link</label>
                    <input type="text" id="project-live" placeholder="https://...">
                </div>
                <div class="success-msg" id="form-success"></div>
                <div class="error-msg" id="form-error"></div>
                <button type="submit" class="btn" id="save-project-btn">
                    <i class="fas fa-save"></i> Save Project
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // API Configuration - Uses CONFIG from config.js
        const API_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL)
            ? CONFIG.API_BASE_URL
            : 'http://localhost:5000/api';
        let authToken = localStorage.getItem('adminToken');

        // DOM Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');

        // Check if already logged in
        if (authToken) {
            verifyToken();
        }

        // Login Form Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    authToken = data.data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    showError(loginError, data.message || 'Login failed');
                }
            } catch (error) {
                showError(loginError, 'Connection error. Make sure backend is running.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // Verify Token
        async function verifyToken() {
            try {
                const response = await fetch(`${API_URL}/admin/verify`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    showDashboard();
                } else {
                    logout();
                }
            } catch (error) {
                logout();
            }
        }

        // Show Dashboard
        function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            loadProjects();
            loadContacts();
        }

        // Logout
        function logout() {
            authToken = null;
            localStorage.removeItem('adminToken');
            loginSection.style.display = 'flex';
            dashboardSection.style.display = 'none';
        }

        logoutBtn.addEventListener('click', logout);

        // Tab Navigation
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
            });
        });

        // Load Projects
        async function loadProjects() {
            const tbody = document.getElementById('projects-table');

            try {
                const response = await fetch(`${API_URL}/projects`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(project => `
                        <tr>
                            <td><strong>${project.title}</strong></td>
                            <td>
                                <div class="tech-tags">
                                    ${project.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('')}
                                </div>
                            </td>
                            <td>
                                ${project.githubLink ? `<a href="${project.githubLink}" target="_blank" style="color:#3498db;margin-right:10px;"><i class="fab fa-github"></i></a>` : ''}
                                ${project.liveLink ? `<a href="${project.liveLink}" target="_blank" style="color:#2ecc71;"><i class="fas fa-external-link-alt"></i></a>` : ''}
                            </td>
                            <td>
                                <div class="actions">
                                    <button class="btn-edit" onclick="editProject('${project._id}')"><i class="fas fa-edit"></i></button>
                                    <button class="btn-delete" onclick="deleteProject('${project._id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" class="empty-state">
                                <i class="fas fa-folder-open"></i>
                                <p>No projects yet. Add your first project!</p>
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load projects</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Load Contacts
        async function loadContacts() {
            const tbody = document.getElementById('contacts-table');

            try {
                const response = await fetch(`${API_URL}/contact`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(contact => `
                        <tr>
                            <td><strong>${contact.name}</strong></td>
                            <td><a href="mailto:${contact.email}" style="color:#3498db;">${contact.email}</a></td>
                            <td style="max-width:300px;white-space:pre-wrap;word-break:break-word;">${contact.message.substring(0, 100)}${contact.message.length > 100 ? '...' : ''}</td>
                            <td>${new Date(contact.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteContact('${contact._id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="empty-state">
                                <i class="fas fa-envelope"></i>
                                <p>No contact messages yet</p>
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load contacts</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Project Modal
        const projectModal = document.getElementById('project-modal');
        const projectForm = document.getElementById('project-form');
        const addProjectBtn = document.getElementById('add-project-btn');
        const closeModalBtn = document.getElementById('close-modal');

        addProjectBtn.addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Add Project';
            projectForm.reset();
            document.getElementById('project-id').value = '';
            projectModal.classList.add('show');
        });

        closeModalBtn.addEventListener('click', () => {
            projectModal.classList.remove('show');
        });

        // Save Project
        projectForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const projectId = document.getElementById('project-id').value;
            const projectData = {
                title: document.getElementById('project-title').value,
                description: document.getElementById('project-description').value,
                technologies: document.getElementById('project-technologies').value.split(',').map(t => t.trim()).filter(t => t),
                imageUrl: document.getElementById('project-image').value,
                githubLink: document.getElementById('project-github').value,
                liveLink: document.getElementById('project-live').value
            };

            const saveBtn = document.getElementById('save-project-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                const url = projectId ? `${API_URL}/projects/${projectId}` : `${API_URL}/projects`;
                const method = projectId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(projectData)
                });

                const data = await response.json();

                if (data.success) {
                    projectModal.classList.remove('show');
                    loadProjects();
                } else {
                    showError(document.getElementById('form-error'), data.message);
                }
            } catch (error) {
                showError(document.getElementById('form-error'), 'Failed to save project');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Project';
            }
        });

        // Edit Project
        async function editProject(id) {
            try {
                const response = await fetch(`${API_URL}/projects/${id}`);
                const data = await response.json();

                if (data.success) {
                    const project = data.data;
                    document.getElementById('modal-title').textContent = 'Edit Project';
                    document.getElementById('project-id').value = project._id;
                    document.getElementById('project-title').value = project.title;
                    document.getElementById('project-description').value = project.description;
                    document.getElementById('project-technologies').value = project.technologies.join(', ');
                    document.getElementById('project-image').value = project.imageUrl || '';
                    document.getElementById('project-github').value = project.githubLink || '';
                    document.getElementById('project-live').value = project.liveLink || '';
                    projectModal.classList.add('show');
                }
            } catch (error) {
                alert('Failed to load project');
            }
        }

        // Delete Project
        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;

            try {
                const response = await fetch(`${API_URL}/projects/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                if (data.success) {
                    loadProjects();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Failed to delete project');
            }
        }

        // Delete Contact
        async function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                const response = await fetch(`${API_URL}/contact/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                if (data.success) {
                    loadContacts();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Failed to delete contact');
            }
        }

        // Helper Functions
        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
    </script>
